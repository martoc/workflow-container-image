on:
  workflow_call:
    inputs:
      region:
        type: string
        required: true
      repository_name:
        type: string
        required: true
      aws_account_id:
        type: string
        required: true
      role_to_assume:
        type: string
        required: true
      platforms:
        type: string
        required: false
        default: linux/arm64,linux/amd64
      lfs:
        type: boolean
        required: false
        default: false
    secrets:
      go_github_username:
        required: false
      go_github_token:
        required: false
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 10
          fetch-tags: true
          lfs: ${{ inputs.lfs }}
      - name: Tag
        uses: martoc/action-tag@v0
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_to_assume }}
          role-session-name: github-actions
          aws-region: ${{ inputs.region }}
      - name: Container Build
        uses: martoc/action-container-build@v0
        with:
          registry: aws
          platforms: ${{ inputs.platforms }}
          region: ${{ inputs.region }}
          repository_name: ${{ inputs.repository_name }}
          aws_account_id: ${{ inputs.aws_account_id }}
          build_args: --build-arg GO_GITHUB_USERNAME=${{ secrets.go_github_username }} --build-arg GO_GITHUB_TOKEN=${{ secrets.go_github_token }}
      - name: Release on GitHub
        uses: martoc/action-release@v0
        if: ${{ github.event_name != 'pull_request' }}
